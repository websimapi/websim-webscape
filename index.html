<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuneScape 2004</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/minimap.css">
  <link rel="stylesheet" href="css/inventory.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="client-wrapper">
    <div id="left-column">
      <div id="game-screen">
        <!-- Game content would be rendered here -->
      </div>
      <div id="chat-window">
        <div class="chat-content">
          <div class="chat-message system">Welcome to Webscape!</div>
        </div>
        <div class="chat-input-area">
          <span class="chat-username" id="current-username">Loading...</span>
          <input type="text" class="chat-input" placeholder="Enter message...">
        </div>
        <div class="chat-tabs">
          <div class="chat-tab">Public chat</div>
          <div class="chat-tab">Private chat</div>
          <div class="chat-tab">Trade/duel</div>
          <div class="chat-tab">Report abuse</div>
        </div>
      </div>
    </div>
    
    <div id="right-panel">
      <div id="minimap-section">
        <div id="compass-container">
          <div id="compass-n">N</div>
          <div id="compass-s">S</div>
          <div id="compass-e">E</div>
          <div id="compass-w">W</div>
        </div>
        <div id="minimap-container">
          <div id="minimap">
            <!-- Minimap content would be rendered here -->
          </div>
        </div>
        <div class="minimap-icons">
          <div class="icon compass" style="--number: '1'"></div>
          <div class="icon prayer" style="--number: '2'"></div>
          <div class="icon magic" style="--number: '3'"></div>
          <div class="icon run" style="--number: '4'"></div>
          <div class="icon stats" style="--number: '5'"></div>
          <div class="icon quests" style="--number: '6'"></div>
          <div class="icon inventory" style="--number: '7'"></div>
        </div>
      </div>
      <div id="inventory">
        <!-- Inventory slots will be generated by JavaScript -->
      </div>
      <div id="bottom-icons">
        <div class="bottom-icon" style="--number: '8'"></div>
        <div class="bottom-icon" style="--number: '9'"></div>
        <div class="bottom-icon" style="--number: '10'"></div>
        <div class="bottom-icon" style="--number: '11'"></div>
        <div class="bottom-icon" style="--number: '12'"></div>
        <div class="bottom-icon" style="--number: '13'"></div>
        <div class="bottom-icon" style="--number: '14'"></div>
      </div>
    </div>
  </div>

  <script src="js/chat.js"></script>
  <script src="js/inventory.js"></script>
  <style>
    /* Adding the numbers via CSS content */
    .icon::after {
      content: var(--number);
    }
    .bottom-icon::after {
      content: var(--number);
    }
  </style>

</body>
</html>
