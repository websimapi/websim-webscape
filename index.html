<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuneScape 2004</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/minimap.css">
  <link rel="stylesheet" href="css/inventory.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="client-wrapper">
    <div id="left-column">
      <div id="game-screen">
        <!-- Game content would be rendered here -->
      </div>
      <div id="chat-window">
        <div class="chat-content">
          <div class="chat-message system" style="color: #000;">Welcome to Webscape!</div>
        </div>
        <div class="chat-input-area">
          <span class="chat-username" id="current-username">Loading...</span>
          <input type="text" class="chat-input" placeholder="Enter message...">
        </div>
        <div class="chat-tabs">
          <div class="chat-tab">Public chat</div>
          <div class="chat-tab">Private chat</div>
          <div class="chat-tab">Trade/duel</div>
          <div class="chat-tab">Report abuse</div>
        </div>
      </div>
    </div>
    
    <div id="right-panel">
      <div id="minimap-section">
        <div id="compass-container">
          <div id="compass-n">N</div>
          <div id="compass-s">S</div>
          <div id="compass-e">E</div>
          <div id="compass-w">W</div>
        </div>
        <div id="minimap-container">
          <div id="minimap">
            <!-- Minimap content would be rendered here -->
          </div>
        </div>
        <div class="minimap-icons">
          <div class="icon compass">1</div>
          <div class="icon prayer">2</div>
          <div class="icon magic">3</div>
          <div class="icon chest">
            <!-- Custom detailed Chest icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="chestGradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#b5651d"/>
                  <stop offset="100%" stop-color="#8b4513"/>
                </linearGradient>
              </defs>
              <!-- Chest base -->
              <rect x="2" y="10" width="20" height="10" rx="2" ry="2" fill="url(#chestGradient)" stroke="#654321" stroke-width="1"/>
              <!-- Chest lid -->
              <rect x="4" y="4" width="16" height="8" rx="2" ry="2" fill="url(#chestGradient)" stroke="#654321" stroke-width="1"/>
              <!-- Lid separation line -->
              <line x1="4" y1="10" x2="20" y2="10" stroke="#654321" stroke-width="1"/>
              <!-- Chest lock detail -->
              <rect x="10" y="13" width="4" height="4" fill="#D2B48C" stroke="#654321" stroke-width="1"/>
            </svg>
          </div>
          <div class="icon stats">5</div>
          <div class="icon quests">6</div>
          <div class="icon inventory">7</div>
        </div>
      </div>
      <div id="inventory" class="hidden">
        <!-- Inventory slots will be generated dynamically -->
      </div>
      <div id="bottom-icons">
        <div class="bottom-icon">8</div>
        <div class="bottom-icon">9</div>
        <div class="bottom-icon">10</div>
        <div class="bottom-icon">11</div>
        <div class="bottom-icon">12</div>
        <div class="bottom-icon">13</div>
        <div class="bottom-icon">14</div>
      </div>
    </div>
  </div>

  <script src="js/chat.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/menu.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
