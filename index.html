  <div id="client-wrapper">
    <!-- Left column: game screen and chat window -->

      <div id="game-screen">
        <!-- The minimap is overlaid on the game screen -->
        <div id="minimap">
          <div class="minimap-content">Minimap</div>
        </div>
        <div class="game-label">Game Screen</div>
      </div>
      <div id="chat-window">
        <div class="chat-label">Chat / Mud Client Window</div>
        <!-- Chat log content would go here -->
      </div>
    </div>
    <!-- Right column: inventory panel -->
    <div id="inventory">
      <div class="inventory-label">Inventory</div>
      <!-- Inventory grid would be set up here -->
    </div>
  </div>
