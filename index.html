<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuneScape 2004</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="client-wrapper">
    <div id="left-column">
      <div id="game-screen">
        <!-- Game content would be rendered here -->
      </div>
      <div id="chat-window">
        <div class="chat-content">
          <div class="chat-message system">Welcome to Webscape!</div>
        </div>
        <div class="chat-input-area">
          <span class="chat-username" id="current-username">Loading...</span>
          <input type="text" class="chat-input" placeholder="Enter message...">
        </div>
        <div class="chat-tabs">
          <div class="chat-tab">Public chat</div>
          <div class="chat-tab">Private chat</div>
          <div class="chat-tab">Trade/duel</div>
          <div class="chat-tab">Report abuse</div>
        </div>
      </div>
    </div>
    
    <div id="right-panel">
      <div id="minimap-section">
        <div id="compass-container">
          <div id="compass-n">N</div>
          <div id="compass-s">S</div>
        </div>
        <div id="minimap-container">
          <div id="minimap">
            <!-- Minimap content would be rendered here -->
          </div>
        </div>
        <div class="minimap-icons">
          <div class="icon compass"></div>
          <div class="icon prayer"></div>
          <div class="icon magic"></div>
          <div class="icon run"></div>
          <div class="icon stats"></div>
          <div class="icon quests"></div>
          <div class="icon inventory"></div>
        </div>
      </div>
      <div id="inventory">
        <!-- All 28 inventory slots -->
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
      </div>
      <div id="bottom-icons">
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
        <div class="bottom-icon"></div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    // Initialize WebSocket connection
    const room = new WebsimSocket();

    // Get the username element
    const usernameElement = document.getElementById('current-username');
    
    // Update username when connection is established
    room.party.subscribe((peers) => {
      const currentUser = room.party.client;
      if (currentUser && currentUser.username) {
        usernameElement.textContent = currentUser.username;
      }
    });

    // Handle chat input
    const chatInput = document.querySelector('.chat-input');
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        const message = chatInput.value.trim();
        
        // Send chat message
        room.send({
          type: 'chat',
          message: message
        });

        // Add message to chat window
        const chatContent = document.querySelector('.chat-content');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'chat-message user';
        messageDiv.textContent = `${room.party.client.username}: ${message}`;
        chatContent.appendChild(messageDiv);
        chatContent.scrollTop = chatContent.scrollHeight;

        // Clear input
        chatInput.value = '';
      }
    });

    // Handle incoming chat messages
    room.onmessage = (event) => {
      if (event.data.type === 'chat' && event.data.clientId !== room.party.client.id) {
        const chatContent = document.querySelector('.chat-content');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'chat-message user';
        messageDiv.textContent = `${event.data.username}: ${event.data.message}`;
        chatContent.appendChild(messageDiv);
        chatContent.scrollTop = chatContent.scrollHeight;
      }
    };
  </script>
