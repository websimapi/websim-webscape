<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuneScape 2004</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/minimap.css">
  <link rel="stylesheet" href="css/inventory.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="client-wrapper">
    <div id="left-column">
      <div id="game-screen">
        <!-- Game content would be rendered here -->
      </div>
      <div id="chat-window">
        <div class="chat-content">
          <div class="chat-message system">Welcome to Webscape!</div>
        </div>
        <div class="chat-input-area">
          <span class="chat-username" id="current-username">Loading...</span>
          <input type="text" class="chat-input" placeholder="Enter message...">
        </div>
        <div class="chat-tabs">
          <div class="chat-tab">Public chat</div>
          <div class="chat-tab">Private chat</div>
          <div class="chat-tab">Trade/duel</div>
          <div class="chat-tab">Report abuse</div>
        </div>
      </div>
    </div>
    
    <div id="right-panel">
      <div id="minimap-section">
        <div id="compass-container">
          <div id="compass-n">N</div>
          <div id="compass-s">S</div>
          <div id="compass-e">E</div>
          <div id="compass-w">W</div>
        </div>
        <div id="minimap-container">
          <div id="minimap">
            <!-- Minimap content would be rendered here -->
          </div>
        </div>
        <div class="minimap-icons">
          <div class="icon compass">1</div>
          <div class="icon prayer">2</div>
          <div class="icon magic">3</div>
          <div class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M5,2C3.89,2 3,2.89 3,4V20C3,21.11 3.89,22 5,22H19C20.11,22 21,21.11 21,20V4C21,2.89 20.11,2 19,2H5M5,4H19V8H5V4M5,10H19V14H5V10M5,16H19V20H5V16Z"/>
            </svg>
          </div>
          <div class="icon stats">5</div>
          <div class="icon quests">6</div>
          <div class="icon inventory">7</div>
        </div>
      </div>
      <div id="inventory">
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
        <div class="inventory-slot"></div>
      </div>
      <div id="bottom-icons">
        <div class="bottom-icon">8</div>
        <div class="bottom-icon">9</div>
        <div class="bottom-icon">10</div>
        <div class="bottom-icon">11</div>
        <div class="bottom-icon">12</div>
        <div class="bottom-icon">13</div>
        <div class="bottom-icon">14</div>
      </div>
    </div>
  </div>

  <script src="js/chat.js"></script>

</body>
</html>
